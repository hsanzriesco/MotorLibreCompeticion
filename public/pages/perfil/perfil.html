<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Motor Libre Competición</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="icon" type="image/png" href="../../img/imagen-tfg.png">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/alertas.css">

    <link rel="stylesheet" href="./perfil.css">

</head>

<body>
    <nav class="navbar navbar-dark bg-dark border-bottom border-danger px-3 fixed-top">
        <a href="../../index.html" class="navbar-brand d-flex align-items-center">
            <img src="../../img/imagen-tfg.png" alt="Logo" height="70" class="me-2">
        </a>

        <div class="d-flex align-items-center">
            <a href="../auth/login/login.html" id="login-icon" class="text-light me-3" style="display: none;">
                <i class="bi bi-person-circle fs-4"></i>
            </a>
            <span id="user-name" class="text-light me-3"></span>
            <button class="btn btn-dark border border-secondary" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#offcanvasMenu" aria-controls="offcanvasMenu">
                <i class="bi bi-list fs-4"></i>
            </button>
        </div>
    </nav>

    <div class="offcanvas offcanvas-end bg-dark text-light" tabindex="-1" id="offcanvasMenu">
        <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="offcanvas-title">Menú</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <a href="../../index.html" class="d-block text-light mb-2">
                <i class="bi bi-house"></i> Inicio
            </a>
            <a href="../calendario/calendario.html" class="d-block text-light mb-2">
                <i class="bi bi-calendar-event"></i> Calendario
            </a>
            <a href="./perfil.html" class="d-block text-danger fw-bold mb-2">
                <i class="bi bi-person-circle"></i> Mi perfil
            </a>
            <hr class="border-secondary">
            <a href="#" id="logout-btn" class="d-block text-danger">
                <i class="bi bi-box-arrow-right"></i> Cerrar sesión
            </a>
        </div>
    </div>

    <main class="container">
        <section class="profile-card">
            <h2 class="text-center mb-4">⚙️ Configuración de Perfil</h2>

            <form id="profile-form">
                <input type="hidden" id="user-id">

                <div class="mb-3">
                    <label for="profile-name" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="profile-name" required>
                    <div class="form-text text-light-emphasis">Este es tu nombre visible en la plataforma.</div>
                </div>

                <div class="mb-3">
                    <label for="profile-email" class="form-label">Correo Electrónico</label>
                    <input type="email" class="form-control" id="profile-email" required readonly>
                    <div class="form-text text-danger">El correo electrónico no se puede cambiar.</div>
                </div>

                <div class="d-grid gap-2 mb-4">
                    <button type="submit" class="btn btn-danger btn-lg"><i class="bi bi-save"></i> Guardar
                        Cambios</button>
                </div>
            </form>

            <hr class="border-secondary">

            <div class="d-grid gap-2">
                <button id="change-password-btn" class="btn btn-outline-danger btn-sm" data-bs-toggle="modal"
                    data-bs-target="#passwordModal">
                    <i class="bi bi-key"></i> Cambiar Contraseña
                </button>
            </div>
        </section>
    </main>

    <div class="modal fade" id="passwordModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content-custom">
                <div class="modal-header border-danger">
                    <h5 class="modal-title text-light">Cambiar Contraseña</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="password-form">
                        <div class="mb-3">
                            <label for="current-password" class="form-label">Contraseña Actual</label>
                            <input type="password" class="form-control" id="current-password" required>
                        </div>
                        <div class="mb-3">
                            <label for="new-password" class="form-label">Nueva Contraseña</label>
                            <input type="password" class="form-control" id="new-password" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirm-new-password" class="form-label">Confirmar Nueva Contraseña</label>
                            <input type="password" class="form-control" id="confirm-new-password" required>
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-danger"><i class="bi bi-lock"></i> Actualizar
                                Contraseña</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="../../js/alertas.js"></script>
    <script src="./perfil.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

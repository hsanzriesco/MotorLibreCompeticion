<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Perfil - Motor Libre Competición</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
    
    <link rel="stylesheet" href="../../../css/alertas.css" />
</head>
<body>
    <nav class="navbar navbar-dark bg-dark border-bottom border-danger px-3">
        <a href="/index.html" class="navbar-brand d-flex align-items-center">
            <img src="/img/imagen-tfg.png" alt="Logo" height="70" class="me-2" />
        </a>
        <div class="d-flex align-items-center">
            <span id="user-name" class="text-light me-3"></span>
            <button class="btn btn-dark border border-secondary" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasMenu">
                <i class="bi bi-list fs-4"></i>
            </button>
        </div>
    </nav>

    <div class="offcanvas offcanvas-end bg-dark text-light" tabindex="-1" id="offcanvasMenu">
        <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="offcanvas-title">Menú</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <a href="/index.html" class="d-block text-light mb-2">Inicio</a>
            <hr class="border-secondary" />
            <a href="#" id="logout-btn" class="d-block text-danger"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a>
        </div>
    </div>

    <main class="container mt-5 text-light text-center">
        <h1 class="text-danger mb-4">Mi Perfil</h1>
        <div id="perfil-info" class="bg-dark p-4 rounded border border-danger shadow-lg">
            <p><strong>Nombre:</strong> <span id="perfil-nombre"></span></p>
            <p><strong>Email:</strong> <span id="perfil-email"></span></p>
            <p><strong>Rol:</strong> <span id="perfil-rol"></span></p>
        </div>
        
        </main>

    <script src="../../../js/alertas.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Usamos localStorage, unificando con el JS externo
            const usuario = JSON.parse(localStorage.getItem("usuario")); 

            if (!usuario) {
                // Usamos la función global mostrarAlerta
                mostrarAlerta("⚠️ Debes iniciar sesión para acceder a tu perfil.", "error", 2000); 
                setTimeout(() => {
                    window.location.href = "/pages/auth/login/login.html";
                }, 2000); // Espera a que termine la alerta antes de redirigir
                return;
            }

            document.getElementById("perfil-nombre").textContent = usuario.name;
            document.getElementById("perfil-email").textContent = usuario.email;
            document.getElementById("perfil-rol").textContent = usuario.role;
            document.getElementById("user-name").textContent = usuario.name;

            document.getElementById("logout-btn").addEventListener("click", (e) => {
                e.preventDefault();
                localStorage.removeItem("usuario");
                mostrarAlerta("Has cerrado sesión correctamente.", 'error', 1500);
                setTimeout(() => {
                    window.location.href = "/pages/auth/login/login.html";
                }, 1500);
            });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

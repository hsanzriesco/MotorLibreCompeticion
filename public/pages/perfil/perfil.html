<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Perfil - Motor Libre Competición</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- Estilos -->
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/navbar.css" />
  <link rel="stylesheet" href="../../css/alertas.css" />
  <link rel="stylesheet" href="../../css/perfil.css" />

  <link rel="icon" href="../../img/imagen-tfg.png" type="image/png" />
</head>

<body>
  <!-- ✅ NAVBAR -->
  <nav class="navbar navbar-dark bg-dark border-bottom border-danger fixed-top px-3">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="../../index.html">
        <img src="../../img/imagen-tfg.png" alt="Logo" height="55" class="me-2" />
        <span class="fw-bold text-danger">Motor Libre Competición</span>
      </a>

      <div class="d-flex align-items-center">
        <a href="../../pages/auth/login/login.html" id="login-icon" class="text-light me-3">
          <i class="bi bi-person-circle fs-4"></i>
        </a>
        <button
          class="btn btn-dark border border-secondary"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#offcanvasUserMenu"
          aria-controls="offcanvasUserMenu"
        >
          <i class="bi bi-list fs-4"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- ✅ MENÚ HAMBURGUESA USUARIO -->
  <div class="offcanvas offcanvas-end bg-dark text-light" tabindex="-1" id="offcanvasUserMenu">
    <div class="offcanvas-header border-bottom border-secondary">
      <h5 class="offcanvas-title">Menú Usuario</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <a href="./perfil.html" class="d-block text-light mb-2">
        <i class="bi bi-person"></i> Mi Perfil
      </a>
      <a href="../../index.html" class="d-block text-light mb-2">
        <i class="bi bi-house"></i> Inicio
      </a>
      <a href="#" id="logoutBtn" class="d-block text-danger">
        <i class="bi bi-box-arrow-right"></i> Cerrar sesión
      </a>
    </div>
  </div>

  <!-- ✅ CONTENIDO PERFIL -->
  <main class="container perfil-container" style="margin-top: 110px;">
    <div class="perfil-box mx-auto p-4 rounded shadow-lg bg-dark text-light border border-danger" style="max-width: 600px;">
      <h2 class="text-danger mb-4 text-center">Mi Perfil</h2>

      <!-- Actualizar nombre -->
      <div class="mb-4">
        <h5 class="text-danger">Actualizar nombre de usuario</h5>
        <form id="updateUsernameForm">
          <input type="text" id="newUsername" class="form-control bg-dark text-light border-secondary mb-2" placeholder="Nuevo nombre de usuario" required />
          <button type="submit" class="btn btn-danger w-100">Actualizar</button>
        </form>
      </div>

      <!-- Cambiar contraseña -->
      <div class="mb-4">
        <h5 class="text-danger">Cambiar contraseña</h5>
        <form id="updatePasswordForm">
          <input type="password" id="currentPassword" class="form-control bg-dark text-light border-secondary mb-2" placeholder="Contraseña actual" required />
          <input type="password" id="newPassword" class="form-control bg-dark text-light border-secondary mb-2" placeholder="Nueva contraseña" required />
          <input type="password" id="confirmNewPassword" class="form-control bg-dark text-light border-secondary mb-2" placeholder="Confirmar nueva contraseña" required />
          <button type="submit" class="btn btn-danger w-100">Cambiar Contraseña</button>
        </form>
      </div>

      <!-- Mi garaje -->
      <div>
        <h5 class="text-danger">Mi Garaje</h5>
        <form id="addCarForm">
          <input type="text" id="carName" class="form-control bg-dark text-light border-secondary mb-2" placeholder="Nombre del coche" required />
          <input type="text" id="carModel" class="form-control bg-dark text-light border-secondary mb-2" placeholder="Modelo" required />
          <input type="url" id="carImage" class="form-control bg-dark text-light border-secondary mb-2" placeholder="URL de la imagen del coche (opcional)" />
          <button type="submit" class="btn btn-danger w-100">Añadir Coche</button>
        </form>

        <div id="carGallery" class="row mt-4"></div>
      </div>
    </div>
  </main>

  <!-- ✅ ALERTAS -->
  <div id="alertContainer"></div>

  <!-- ✅ SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../js/perfil.js"></script>
</body>
</html>

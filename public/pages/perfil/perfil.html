<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Perfil - Motor Libre Competición</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- Estilos principales -->
  <link rel="stylesheet" href="../../../css/main.css" />
  <link rel="stylesheet" href="../../../css/navbar.css" />
  <link rel="icon" type="image/png" href="../../../img/imagen-tfg.png" />
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark border-bottom border-danger fixed-top px-3">
    <a href="../../../index.html" class="navbar-brand">
      <img src="../../../img/imagen-tfg.png" alt="Logo" height="60" />
    </a>
    <span class="navbar-text text-light fw-bold">Mi Perfil</span>
  </nav>

  <!-- Contenido principal -->
  <main class="container mt-5 main-content">
    <div class="profile-container">
      <h1>Mi Perfil</h1>
      <h2 id="usernameDisplay">Cargando...</h2>

      <!-- Cambiar nombre de usuario -->
      <section class="mb-4">
        <h3>Cambiar nombre de usuario</h3>
        <form id="updateNameForm">
          <input type="text" id="newUsername" placeholder="Nuevo nombre de usuario" required class="form-control mb-2" />
          <button type="submit" class="btn btn-danger w-100">Actualizar nombre</button>
        </form>
      </section>

      <!-- Cambiar contraseña -->
      <section class="mb-4">
        <h3>Cambiar contraseña</h3>
        <form id="updatePasswordForm">
          <input type="password" id="newPassword" placeholder="Nueva contraseña" required class="form-control mb-2" />
          <input type="password" id="confirmPassword" placeholder="Confirmar contraseña" required class="form-control mb-2" />
          <button type="submit" class="btn btn-danger w-100">Actualizar contraseña</button>
        </form>
      </section>

      <!-- Añadir coche -->
      <section class="mb-4">
        <h3>Añadir coche al garaje</h3>
        <form id="addCarForm" enctype="multipart/form-data">
          <input type="text" id="carName" placeholder="Nombre del coche" required class="form-control mb-2" />
          <input type="file" id="carImage" accept="image/*" class="form-control mb-2" />
          <button type="submit" class="btn btn-danger w-100">Añadir coche</button>
        </form>
      </section>

      <!-- Mi Garaje -->
      <section>
        <h3>Mi Garaje</h3>
        <div id="garageContainer" class="row mt-3">
          <p class="text-center text-light">Cargando tus coches...</p>
        </div>
      </section>
    </div>
  </main>

  <script src="./perfil.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Administración - Motor Libre Competición</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- Estilos propios -->
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/navbar.css" />
  <link rel="stylesheet" href="./css/admin.css" />
  <link rel="stylesheet" href="./css/alertas.css" />

  <link rel="icon" href="./img/imagen-tfg.png" type="image/png" />
</head>

<body>
  <!-- ✅ NAVBAR ADMIN -->
  <nav class="navbar navbar-dark bg-dark border-bottom border-danger fixed-top px-3">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="./admin.html">
        <img src="./img/imagen-tfg.png" alt="Logo" height="55" class="me-2" />
        <span class="fw-bold text-danger">Motor Libre Competición</span>
      </a>

      <div class="d-flex align-items-center">
        <a href="./pages/auth/login/login.html" id="login-icon" class="text-light me-3">
          <i class="bi bi-person-circle fs-4"></i>
        </a>
        <button
          class="btn btn-dark border border-secondary"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#offcanvasAdminMenu"
          aria-controls="offcanvasAdminMenu"
        >
          <i class="bi bi-list fs-4"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- ✅ MENÚ HAMBURGUESA ADMIN -->
  <div class="offcanvas offcanvas-end bg-dark text-light" tabindex="-1" id="offcanvasAdminMenu">
    <div class="offcanvas-header border-bottom border-secondary">
      <h5 class="offcanvas-title">Panel de Administración</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <a href="./pages/dashboard/admin/calendario.html" class="d-block text-light mb-2">
        <i class="bi bi-calendar-event"></i> Calendario
      </a>
      <a href="./pages/dashboard/admin/usuarios.html" class="d-block text-light mb-2">
        <i class="bi bi-people"></i> Gestionar Usuarios
      </a>
      <hr class="border-secondary" />
      <a href="./index.html" class="d-block text-light mb-2">
        <i class="bi bi-house"></i> Panel Usuario
      </a>
      <hr class="border-secondary" />
      <a href="#" id="logoutAdminBtn" class="d-block text-danger">
        <i class="bi bi-box-arrow-right"></i> Cerrar sesión
      </a>
    </div>
  </div>

  <!-- ✅ CONTENIDO PRINCIPAL -->
  <main class="container text-center" style="margin-top: 100px;">
    <h1 class="text-danger mb-4">Panel de Administración</h1>
    <p class="text-light">
      Desde aquí puedes gestionar usuarios, eventos y el calendario de Motor Libre Competición.
    </p>
    <hr class="border-danger my-4" />
    <p class="text-secondary">Utiliza el menú para navegar entre las secciones de administración.</p>
  </main>

  <!-- ✅ SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // 🔒 Cerrar sesión
    document.getElementById("logoutAdminBtn")?.addEventListener("click", (e) => {
      e.preventDefault();
      sessionStorage.removeItem("usuario");
      window.location.href = "./pages/auth/login/login.html";
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administrador - Motor Libre Competición</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

  <link rel="stylesheet" href="../../../css/navbar.css" />
  <link rel="stylesheet" href="../../../css/style.css" />
  <link rel="icon" href="../../../img/imagen-tfg.png" type="image/png" />
</head>

<body class="bg-dark text-light">
  <!-- ✅ NAVBAR -->
  <nav class="navbar navbar-dark bg-dark border-bottom border-danger fixed-top px-3">
    <a href="../../../index.html" class="navbar-brand d-flex align-items-center">
      <img src="../../../img/imagen-tfg.png" alt="Logo" height="55" class="me-2">
      <span class="fw-bold text-danger">Motor Libre Competición</span>
    </a>

    <div class="d-flex align-items-center">
      <button class="btn btn-dark border border-secondary" type="button" data-bs-toggle="offcanvas"
        data-bs-target="#offcanvasMenu" aria-controls="offcanvasMenu">
        <i class="bi bi-list"></i>
      </button>
    </div>
  </nav>

  <!-- ✅ MENÚ HAMBURGUESA -->
  <div class="offcanvas offcanvas-end bg-dark text-light" tabindex="-1" id="offcanvasMenu">
    <div class="offcanvas-header border-bottom border-secondary">
      <h5 class="offcanvas-title" id="adminGreeting">👋 Bienvenido</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <a href="./admin.html" class="d-block text-light mb-2">Calendario</a>
      <a href="./user/users.html" class="d-block text-light mb-2">Gestionar Usuarios</a>
      <hr class="border-secondary">
      <a href="#" id="logoutBtn" class="d-block text-danger">
        <i class="bi bi-box-arrow-right"></i> Cerrar sesión
      </a>
    </div>
  </div>

  <!-- ✅ CONTENIDO PRINCIPAL -->
  <main class="container text-center" style="margin-top: 100px;">
    <h1 class="text-danger mb-4">Panel de Administración</h1>
    <p class="text-light">Gestiona usuarios, eventos y la comunidad de Motor Libre Competición.</p>
    <div id="calendar" class="mt-4"></div>
  </main>

  <!-- ✅ SCRIPTS -->
  <script src="./admin.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Mostrar nombre del usuario admin
    document.addEventListener("DOMContentLoaded", () => {
      const user = JSON.parse(sessionStorage.getItem("usuario"));
      const greeting = document.getElementById("adminGreeting");
      if (user && user.name) greeting.textContent = `👋 Hola, ${user.name}`;
    });

    // Cerrar sesión
    document.getElementById("logoutBtn")?.addEventListener("click", (e) => {
      e.preventDefault();
      sessionStorage.clear();
      window.location.href = "../../../pages/auth/login/login.html";
    });
  </script>
</body>
</html>

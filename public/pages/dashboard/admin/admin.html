<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Administrador - Motor Libre Competición</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

  <!-- Estilos -->
  <link rel="stylesheet" href="../../../css/style.css" />
  <link rel="stylesheet" href="../../../css/navbar.css" />
  <link rel="icon" href="../../../img/imagen-tfg.png" type="image/png" />

  <style>
    body {
      background-color: #111;
      color: #fff;
    }

    main {
      margin-top: 80px;
      padding: 20px;
      min-height: 100vh;
    }

    .admin-section {
      background: rgba(20, 20, 20, 0.9);
      border: 1px solid rgba(229, 9, 20, 0.5);
      box-shadow: 0 0 20px rgba(229, 9, 20, 0.25);
      border-radius: 15px;
      padding: 1.5rem;
      margin: 1rem auto;
      width: 95%;
      max-width: 1200px;
    }

    #calendar {
      background: rgba(30, 30, 30, 0.8);
      border-radius: 10px;
      padding: 10px;
    }

    .btn-danger {
      background-color: #e50914;
      border: none;
    }

    .btn-danger:hover {
      background-color: #ff1a1a;
    }

    .form-control,
    .form-select {
      background-color: #222;
      color: white;
      border: 1px solid #444;
    }

    .form-control:focus {
      background-color: #222;
      border-color: #e50914;
      color: white;
      box-shadow: 0 0 5px rgba(229, 9, 20, 0.5);
    }
  </style>
</head>

<body>
  <!-- ✅ NAVBAR -->
  <nav class="navbar navbar-dark bg-dark border-bottom border-danger px-3 fixed-top">
    <a href="../../../index.html" class="navbar-brand d-flex align-items-center">
      <img src="../../../img/imagen-tfg.png" alt="Logo" height="55" class="me-2" />
    </a>

    <div class="d-flex align-items-center">
      <!-- Icono de iniciar sesión -->
      <a href="../../../pages/auth/login/login.html" id="login-icon" class="text-light me-3">
        <i class="bi bi-person-circle fs-4"></i>
      </a>

      <!-- Botón del menú hamburguesa -->
      <button class="btn btn-dark border border-secondary" type="button" data-bs-toggle="offcanvas"
        data-bs-target="#offcanvasMenu" aria-controls="offcanvasMenu">
        <i class="bi bi-list fs-4"></i>
      </button>
    </div>
  </nav>

  <!-- ✅ MENÚ HAMBURGUESA -->
  <div class="offcanvas offcanvas-end bg-dark text-light" tabindex="-1" id="offcanvasMenu">
    <div class="offcanvas-header border-bottom border-secondary">
      <h5 class="offcanvas-title">Menú Administrador</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body">
      <a href="./admin.html" class="d-block text-light mb-2">Calendario</a>
      <a href="./user/users.html" class="d-block text-light mb-2">Gestionar Usuarios</a>
      <hr class="border-secondary" />
      <a href="../../../index.html" class="d-block text-light mb-2">Panel Usuario</a>
      <a href="#" id="logout-btn" class="d-block text-danger">
        <i class="bi bi-box-arrow-right"></i> Cerrar sesión
      </a>
    </div>
  </div>

  <!-- ✅ CONTENIDO PRINCIPAL -->
  <main>
    <section class="admin-section">
      <h2 class="text-center mb-4">Gestión de Eventos</h2>
      <div id="calendar"></div>
    </section>
  </main>

  <!-- ✅ MODAL PARA CREAR / EDITAR EVENTOS -->
  <div class="modal fade" id="eventModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header border-danger">
          <h5 class="modal-title fw-bold text-light">
            📅 Gestión de Evento
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <form id="eventForm">
            <input type="hidden" id="eventId" />

            <div class="mb-3">
              <label for="title" class="form-label">Título *</label>
              <input type="text" id="title" class="form-control" placeholder="Ej: Carrera en Montmeló" required />
            </div>

            <div class="mb-3">
              <label for="description" class="form-label">Descripción</label>
              <textarea id="description" class="form-control" rows="3" placeholder="Detalles del evento..."></textarea>
            </div>

            <div class="mb-3">
              <label for="location" class="form-label">Ubicación</label>
              <input type="text" id="location" class="form-control" placeholder="Ej: Circuito Ricardo Tormo" />
            </div>

            <!-- 🗓️ FECHA Y HORAS -->
            <div class="mb-3 p-3 rounded-3 border border-danger bg-dark bg-opacity-50">
              <label for="start-date" class="form-label fw-semibold">Fecha *</label>
              <input type="date" id="start-date" class="form-control mb-3" readonly />

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="start-time" class="form-label">Hora de inicio *</label>
                  <input type="time" id="start-time" class="form-control" required />
                </div>
                <div class="col-md-6 mb-3">
                  <label for="end-time" class="form-label">Hora de fin *</label>
                  <input type="time" id="end-time" class="form-control" required />
                </div>
              </div>
            </div>

            <div class="mb-3">
              <label for="image" class="form-label">Imagen (opcional)</label>
              <input type="file" id="image" class="form-control" accept="image/*" />
            </div>
          </form>
        </div>

        <div class="modal-footer border-danger">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            <i class="bi bi-x-circle"></i> Cerrar
          </button>
          <button id="deleteEventBtn" type="button" class="btn btn-outline-danger me-auto">
            <i class="bi bi-trash"></i> Eliminar
          </button>
          <button id="saveEventBtn" type="button" class="btn btn-danger">
            <i class="bi bi-save"></i> Guardar
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ✅ SCRIPTS -->
  <script src="./admin.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // 🔒 Cerrar sesión
    document.getElementById("logout-btn").addEventListener("click", (e) => {
      e.preventDefault();
      localStorage.removeItem("usuario");

      const alert = document.createElement("div");
      alert.textContent = "Sesión cerrada correctamente.";
      alert.style.position = "fixed";
      alert.style.top = "20px";
      alert.style.left = "50%";
      alert.style.transform = "translateX(-50%)";
      alert.style.backgroundColor = "#e50914";
      alert.style.color = "white";
      alert.style.padding = "10px 20px";
      alert.style.borderRadius = "8px";
      alert.style.zIndex = "3000";
      document.body.appendChild(alert);

      setTimeout(() => {
        alert.remove();
        window.location.href = "../../../pages/auth/login/login.html";
      }, 1500);
    });
  </script>
</body>
</html>

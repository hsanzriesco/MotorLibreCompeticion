<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Administrador - Motor Libre Competición</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
  <link rel="icon" href="../../../img/imagen-tfg.png" type="image/png" />
  <link rel="stylesheet" href="../../../css/style.css" />

  <style>
    body { background-color: #111; color: #fff; }
    main { margin-top: 80px; padding: 20px; min-height: 100vh; }
    .admin-section { background: rgba(20,20,20,0.9); border:1px solid rgba(229,9,20,0.5);
      box-shadow:0 0 20px rgba(229,9,20,0.25); border-radius:15px; padding:1.5rem; width:95%; max-width:1200px; margin:auto;}
  </style>
</head>

<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark border-bottom border-danger px-3 fixed-top">
    <a href="../../../index.html" class="navbar-brand d-flex align-items-center">
      <img src="../../../img/imagen-tfg.png" alt="Logo" height="60" class="me-2" />
      <span class="fw-bold text-danger">Panel Admin</span>
    </a>

    <button class="btn btn-dark border border-secondary" type="button" data-bs-toggle="offcanvas"
      data-bs-target="#offcanvasMenu" aria-controls="offcanvasMenu">
      <i class="bi bi-list"></i>
    </button>
  </nav>

  <!-- MENÚ HAMBURGUESA -->
  <div class="offcanvas offcanvas-end bg-dark text-light" tabindex="-1" id="offcanvasMenu">
    <div class="offcanvas-header border-bottom border-secondary">
      <h5 class="offcanvas-title">Menú Administrador</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <a href="./admin.html" class="d-block text-light mb-2">Calendario</a>
      <a href="./user/users.html" class="d-block text-light mb-2">Gestionar Usuarios</a>
      <hr class="border-secondary" />
      <a href="../../../index.html" class="d-block text-light mb-2">Panel Usuario</a>
      <a href="#" id="logout-btn" class="d-block text-danger">
        <i class="bi bi-box-arrow-right"></i> Cerrar sesión
      </a>
    </div>
  </div>

  <main>
    <section class="admin-section">
      <h2 class="text-center mb-4">Gestión de Eventos</h2>
      <div id="calendar"></div>
    </section>
  </main>

  <script>
    document.getElementById("logout-btn").addEventListener("click", (e) => {
      e.preventDefault();
      localStorage.removeItem("usuario");
      const msg = document.createElement("div");
      msg.textContent = "Has cerrado sesión correctamente.";
      msg.style.position = "fixed";
      msg.style.top = "20px";
      msg.style.left = "50%";
      msg.style.transform = "translateX(-50%)";
      msg.style.backgroundColor = "#dc3545";
      msg.style.color = "white";
      msg.style.padding = "10px 20px";
      msg.style.borderRadius = "10px";
      msg.style.zIndex = "9999";
      document.body.appendChild(msg);
      setTimeout(() => {
        msg.remove();
        window.location.href = "../../../pages/auth/login/login.html";
      }, 1500);
    });
  </script>

  <script src="./admin.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

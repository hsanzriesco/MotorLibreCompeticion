<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrarse - Motor Libre Competición</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../../css/navbar.css" />
  <link rel="stylesheet" href="../../../css/style.css" />
  <link rel="stylesheet" href="../../../css/register.css" />
  <link rel="icon" type="image/png" href="../../../img/imagen-tfg.png">
</head>

<body>
  <!-- ✅ Navbar fijo -->
  <nav class="navbar navbar-dark bg-dark border-bottom border-danger fixed-top px-3">
    <a href="../../../index.html" class="navbar-brand d-flex align-items-center">
      <img src="../../../img/imagen-tfg.png" alt="Logo" height="55" class="me-2" />
      <span>Motor Libre Competición</span>
    </a>
  </nav>

  <!-- ✅ Contenedor principal -->
  <main class="register-section">
    <div class="form-container">
      <div class="form-box">
        <h2>Crear cuenta</h2>
        <form id="registerForm">
          <label for="username">Nombre</label>
          <input type="text" id="username" required placeholder="Ej. piloto123" />

          <label for="email">Correo electrónico</label>
          <input type="email" id="email" required placeholder="ejemplo@correo.com" />

          <label for="password">Contraseña</label>
          <input type="password" id="password" required placeholder="********" />

          <label for="confirmPassword">Confirmar contraseña</label>
          <input type="password" id="confirmPassword" required placeholder="********" />

          <button type="submit" class="btn btn-danger w-100 mt-3">Registrarme</button>
        </form>

        <p class="switch-link mt-3">
          ¿Ya tienes cuenta?
          <a href="../login/login.html" class="text-danger fw-bold">Inicia sesión</a>
        </p>
      </div>
    </div>
  </main>

  <script src="./register.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

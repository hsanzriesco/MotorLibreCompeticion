<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro - Motor Libre Competición</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../../css/style.css" />
</head>

<body class="bg-dark text-light d-flex justify-content-center align-items-center vh-100">
  <div class="register-container p-4 rounded shadow border border-danger">
    <h2 class="text-center text-danger mb-4">Registro</h2>
    <form id="registerForm">
      <div class="mb-3">
        <label for="name" class="form-label">Nombre</label>
        <input type="text" id="name" class="form-control" required />
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Correo electrónico</label>
        <input type="email" id="email" class="form-control" required />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" id="password" class="form-control" required />
      </div>
      <button type="submit" class="btn btn-danger w-100 mt-3">Registrarse</button>
    </form>
    <p class="text-center mt-3">
      ¿Ya tienes cuenta? <a href="/pages/auth/login/login.html" class="text-danger">Inicia sesión</a>
    </p>
  </div>

  <script src="./register.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

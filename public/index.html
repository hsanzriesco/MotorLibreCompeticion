<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motor Libre Competición</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Estilos -->
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/navbar.css">
  <link rel="icon" href="./img/imagen-tfg.png" type="image/png">
</head>

<body>
  <!-- ✅ NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-danger fixed-top px-3">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="./index.html">
        <img src="./img/imagen-tfg.png" alt="Logo" height="55" class="me-2">
        <span class="fw-bold text-danger">Motor Libre Competición</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav align-items-center">
          <li class="nav-item"><a class="nav-link" href="./pages/dashboard/user/perfil.html">Mi Perfil</a></li>
          <li class="nav-item"><a class="nav-link text-danger" href="#" id="logoutBtn">Cerrar sesión</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ✅ CONTENIDO PRINCIPAL -->
  <main class="container text-center" style="margin-top: 100px;">
    <h1 class="text-danger mb-4">Bienvenido a Motor Libre Competición</h1>
    <p class="text-light">Explora eventos, gestiona tu perfil y comparte tu pasión por el motor.</p>
    <hr class="border-danger my-4">
    <p class="text-secondary">Selecciona una opción en el menú para comenzar.</p>
  </main>

  <!-- ✅ SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // 🔒 Cerrar sesión
    document.getElementById("logoutBtn")?.addEventListener("click", (e) => {
      e.preventDefault();
      sessionStorage.removeItem("usuario");
      window.location.href = "./pages/auth/login/login.html";
    });
  </script>
</body>

</html>

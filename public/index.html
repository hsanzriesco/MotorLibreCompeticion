<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motor Libre Competición - Inicio</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/alertas.css">

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">

  <!-- Iconos -->
  <script src="https://kit.fontawesome.com/6f316d1dcf.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- 🧭 NAVBAR -->
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="img/logo.png" alt="Logo" height="45" class="me-2">
        <span>Motor Libre Competición</span>
      </a>

      <!-- Menú hamburguesa -->
      <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuPrincipal">
        <i class="fas fa-bars"></i>
      </button>

      <!-- Menú lateral -->
      <div class="offcanvas offcanvas-end" tabindex="-1" id="menuPrincipal">
        <div class="offcanvas-header">
          <h5 class="offcanvas-title">Menú</h5>
          <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
          <a href="index.html"><i class="fas fa-home me-2"></i>Inicio</a>
          <a href="perfil.html"><i class="fas fa-user me-2"></i>Perfil</a>
          <a href="login.html"><i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión</a>
          <a href="register.html"><i class="fas fa-user-plus me-2"></i>Registrarse</a>
        </div>
      </div>

      <!-- Icono de sesión -->
      <div class="navbar-icons d-none d-lg-flex">
        <a href="login.html" title="Iniciar sesión">
          <i class="fas fa-user-circle session-icon"></i>
        </a>
      </div>
    </div>
  </nav>

  <!-- 🏁 CONTENIDO PRINCIPAL -->
  <main class="container mt-5">
    <h1 class="text-center mb-4">🏁 Próximos Eventos</h1>
    <p class="text-center mb-4">Consulta aquí las fechas de las próximas competiciones.</p>

    <!-- Calendario -->
    <div id="calendar"></div>
  </main>

  <!-- ⚠️ ALERTA -->
  <div id="alerta" class="alerta" style="display: none;">
    <span class="icon"><i class="fas fa-check-circle"></i></span>
    <p id="alerta-texto">Bienvenido al portal de Motor Libre Competición</p>
    <button id="cerrar-alerta">Cerrar</button>
  </div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const calendarEl = document.getElementById('calendar');
      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'es',
        themeSystem: 'standard',
        height: 'auto',
        events: [
          { title: 'Rally Nacional', start: '2025-11-15' },
          { title: 'Circuito Montaña', start: '2025-11-22' },
          { title: 'Carrera Urbana', start: '2025-12-05' }
        ]
      });
      calendar.render();

      // Mostrar alerta al cargar
      const alerta = document.getElementById('alerta');
      const cerrar = document.getElementById('cerrar-alerta');
      alerta.style.display = 'block';
      setTimeout(() => alerta.classList.add('show'), 300);
      cerrar.addEventListener('click', () => {
        alerta.classList.remove('show');
        setTimeout(() => alerta.style.display = 'none', 300);
      });
    });
  </script>
</body>
</html>
